services:
  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    networks:
      - mcp-portal

  mcp-portal:
    build: ./
    ports:
      - '3000:3000'
    env_file:
      - 'compose/aws.env'
      - '.env'
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: redis
      LOCALSTACK_ENDPOINT: http://localstack:4566
      USE_SINGLE_INSTANCE_CACHE: true
    networks:
      - mcp-portal

networks:
  mcp-portal:
    driver: bridge
